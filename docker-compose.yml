services:
  yt-mp3-api:
    build: .
    container_name: yt-mp3-api
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Taipei
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./srt_cache:/app/srt_cache
      - ./:/app/host_files:ro
    tmpfs:
      - /tmp/yt_mp3_downloads:size=512M
